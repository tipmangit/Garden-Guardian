name: garden_guardian
description: Garden Guardian – Wireless Feline Monitoring and Control System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0

  # Navigation
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Network / ESP32 communication
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true